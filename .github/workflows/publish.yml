name: Publish (approved → Instagram投稿)

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: github.event.label.name == 'approved-instagram'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Parse approved issue
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const im = body.match(/<!-- INSTAGRAM_BODY_START -->\s*([\s\S]*?)\s*<!-- INSTAGRAM_BODY_END -->/);
            if (!im) { core.setFailed('BODY markers not found'); return; }
            const caption = im[1].trim();
            const um = body.match(/- image_url: `([^`]+)`/);
            const imageUrl = um ? um[1] : '';
            const cm = body.match(/- carousel_image_urls: `([^`]+)`/);
            const carouselUrls = cm && cm[1] !== '(none, single image)' ? cm[1] : '';
            if (!imageUrl && !carouselUrls) { core.setFailed('image_url not found'); return; }
            core.setOutput('caption', caption);
            core.setOutput('image_url', imageUrl);
            core.setOutput('carousel_urls', carouselUrls);
            const mode = carouselUrls ? `カルーセル(${carouselUrls.split(',').length}枚)` : '単一画像';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 Instagram (${mode}) へ投稿処理を開始します...`,
            });

      - name: Post to Instagram
        env:
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          DRAFT_IN_INSTAGRAM_CAPTION: ${{ steps.parse.outputs.caption }}
          DRAFT_IN_IMAGE_URL: ${{ steps.parse.outputs.image_url }}
          DRAFT_IN_CAROUSEL_URLS: ${{ steps.parse.outputs.carousel_urls }}
          TARGET: instagram
        run: node post.js publish
