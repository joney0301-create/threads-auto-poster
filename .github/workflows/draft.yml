name: Draft (生成 → Issue起票 → LINE通知)

on:
  schedule:
    # JST 7:30 (UTC 前日 22:30) 日月水金のみ下書き起票(週4回・約2日に1回)
    # UTC曜日: 土(6)→日, 日(0)→月, 火(2)→水, 木(4)→金
    - cron: "30 22 * * 0,2,4,6"   
  workflow_dispatch:
    inputs:
      exclude_source_ids:
        description: "除外したい作品ID(カンマ区切り)。LINEから「別のプロジェクトで」と指示された時に渡される"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Generate draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRAFT_OUT: draft.json
          EXCLUDE_SOURCE_IDS: ${{ github.event.inputs.exclude_source_ids }}
        run: node post.js draft

      - name: Create approval issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const draft = JSON.parse(fs.readFileSync('draft.json', 'utf-8'));
            const jstNow = new Date(Date.now() + 9*3600*1000).toISOString().replace('T',' ').slice(0,16);
            const title = `[投稿予定] ${jstNow} JST — ${draft.title || draft.topic}`;
            const sourceLink = draft.source_url ? `[作品ページを開く](${draft.source_url})` : '(参照元URL未設定)';
            const carouselUrls = Array.isArray(draft.carousel_image_urls) ? draft.carousel_image_urls : [];
            const isCarousel = draft.is_carousel && carouselUrls.length >= 2;
            const imageBlock = isCarousel
              ? `## 使用画像 (${carouselUrls.length}枚カルーセル投稿)\n\n` +
                carouselUrls.map((u, i) => `**${i+1}枚目**\n![image-${i+1}](${u})`).join("\n\n")
              : `## 使用画像\n\n![image](${draft.image_url})`;
            const carouselUrlsLine = isCarousel
              ? `- carousel_image_urls: \`${carouselUrls.join(',')}\``
              : `- carousel_image_urls: (none, single image)`;
            const body = [
              `> このIssueは Instagram 投稿の **承認待ち下書き** です。`,
              ``,
              imageBlock,
              ``,
              `- 作品: **${draft.title || '(無題)'}** / ${draft.location || ''}`,
              `- 元ページ: ${sourceLink}`,
              ``,
              `---`,
              ``,
              `## Instagram 用キャプション (2200字以内)`,
              ``,
              `<!-- INSTAGRAM_BODY_START -->`,
              draft.instagram_caption,
              `<!-- INSTAGRAM_BODY_END -->`,
              ``,
              `> 修正したい場合は、START/END マーカーの **間だけ** を編集してください。`,
              ``,
              `---`,
              ``,
              `## 操作方法`,
              ``,
              `- 📷 **Instagramに投稿** → ラベル \`approved-instagram\``,
              `- ❌ **却下** → ラベル \`rejected\``,
              ``,
              `---`,
              ``,
              `<details><summary>メタ情報</summary>`,
              ``,
              `- source_id: ${draft.source_id}`,
              `- topic: ${draft.topic}`,
              `- image_url: \`${draft.image_url}\``,
              carouselUrlsLine,
              `- generated_at: ${draft.generated_at}`,
              ``,
              `</details>`,
            ].join("\n");
            const wanted = [
              { name: 'draft', color: 'fbca04', description: '承認待ち' },
              { name: 'approved-instagram', color: 'e94560', description: 'Instagramに投稿' },
              { name: 'rejected', color: 'b60205', description: '却下' },
              { name: 'posted-instagram', color: 'fad8c7', description: 'Instagram投稿済み' },
              { name: 'scheduled', color: '5319e7', description: '時刻指定の投稿予約' },
              { name: 'failed-instagram', color: 'd93f0b', description: 'Instagram投稿失敗(要再試行)' },
            ];
            const existing = (await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, per_page: 100,
            })).map(l => l.name);
            for (const l of wanted) {
              if (!existing.includes(l.name)) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: l.name, color: l.color, description: l.description,
                });
              }
            }
            const issue = await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body, labels: ['draft'],
            });
            core.notice(`Draft issue created: #${issue.data.number}`);
            core.setOutput('issue_number', issue.data.number);
            core.setOutput('issue_url', issue.data.html_url);
            core.setOutput('issue_title', title);
            core.setOutput('caption_full', draft.instagram_caption || '');
            core.setOutput('image_url', draft.image_url);
            core.setOutput('carousel_urls_json', JSON.stringify(carouselUrls));
            core.setOutput('carousel_count', carouselUrls.length);

      - name: Notify LINE
        if: success() && env.LINE_ACCESS_TOKEN != ''
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          ISSUE_URL: ${{ steps.create_issue.outputs.issue_url }}
          ISSUE_TITLE: ${{ steps.create_issue.outputs.issue_title }}
          CAPTION_FULL: ${{ steps.create_issue.outputs.caption_full }}
          IMAGE_URL: ${{ steps.create_issue.outputs.image_url }}
          CAROUSEL_URLS_JSON: ${{ steps.create_issue.outputs.carousel_urls_json }}
        run: |
          node -e '
            let carouselUrls = [];
            try { carouselUrls = JSON.parse(process.env.CAROUSEL_URLS_JSON || "[]"); } catch {}
            // フォールバック: image_url のみ
            if (carouselUrls.length === 0 && process.env.IMAGE_URL) {
              carouselUrls = [process.env.IMAGE_URL];
            }
            // .jpg/.jpeg/.png のみ送信(WebP/HEICはLINEで弾かれる)
            carouselUrls = carouselUrls.filter(u => u && u.startsWith("https://") && /\.(jpg|jpeg|png)(\?|$)/i.test(u));

            const text = `📷 Instagram投稿の下書き\n\n${process.env.ISSUE_TITLE}\n\n${process.env.CAPTION_FULL}\n\n👉 内容確認/承認:\n${process.env.ISSUE_URL}\n\n承認: ラベル approved-instagram\n却下: ラベル rejected`;

            // LINEは1リクエストで最大5メッセージ。画像最大4枚 + テキスト1個
            const messages = [];
            for (const url of carouselUrls.slice(0, 4)) {
              messages.push({
                type: "image",
                originalContentUrl: url,
                previewImageUrl: url,
              });
            }
            messages.push({ type: "text", text: text.slice(0, 4900) });

            const body = JSON.stringify({
              to: process.env.LINE_USER_ID,
              messages,
            });

            fetch("https://api.line.me/v2/bot/message/push", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${process.env.LINE_ACCESS_TOKEN}`,
              },
              body,
            }).then(async (r) => {
              const t = await r.text();
              if (!r.ok) {
                console.error("LINE notify failed:", r.status, t);
                process.exit(1);
              }
              console.log("LINE notify sent");
            }).catch((e) => {
              console.error("LINE notify error:", e);
              process.exit(1);
            });
          '
