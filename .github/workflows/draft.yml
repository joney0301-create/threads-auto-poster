name: Draft (з”џж€ђ в†’ Issueиµ·зӨЁ в†’ LINEйЂљзџӨ)

on:
  schedule:
    # JST 9:00 (UTC 0:00) гЃ«дё‹ж›ёгЃҚиµ·зӨЁ
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Generate draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRAFT_OUT: draft.json
        run: node post.js draft

      - name: Create approval issue
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const draft = JSON.parse(fs.readFileSync('draft.json', 'utf-8'));
            const jstNow = new Date(Date.now() + 9*3600*1000).toISOString().replace('T',' ').slice(0,16);
            const title = `[жЉ•зЁүдғ€е®љ] ${jstNow} JST вЂ” ${draft.title || draft.topic}`;
            const sourceLink = draft.source_url ? `[дҢње“Ѓгѓљгѓәг‚ёг‚’й–‹гЃЏ](${draft.source_url})` : '(еЏ‚з…§е…ѓURLжњҒиЁ­е®љ)';
            const carouselUrls = Array.isArray(draft.carousel_image_urls) ? draft.carousel_image_urls : [];
            const isCarousel = draft.is_carousel && carouselUrls.length >= 2;
            const imageBlock = isCarousel
              ? `## дҢүз”Ёз”»еѓЏ (${carouselUrls.length}жһљг‚«гѓ«гѓәг‚»гѓ«жЉ•зЁү)\n\n` +
                carouselUrls.map((u, i) => `**${i+1}жһљз›®**\n![image-${i+1}](${u})`).join("\n\n")
              : `## дҢүз”Ёз”»еѓЏ\n\n![image](${draft.image_url})`;
            const carouselUrlsLine = isCarousel
              ? `- carousel_image_urls: \`${carouselUrls.join(',')}\``
              : `- carousel_image_urls: (none, single image)`;
            const body = [
              `> гЃ“гЃ®IssueгЃҮ Instagram жЉ•зЁүгЃ® **ж‰үиҒҚең…гЃҰдё‹ж›ёгЃҚ** гЃ§гЃ™гЂ‚`,
              ``,
              imageBlock,
              ``,
              `- дҢње“Ѓ: **${draft.title || '(з„ҰйҰЊ)'}** / ${draft.location || ''}`,
              `- е…ѓгѓљгѓәг‚ё: ${sourceLink}`,
              ``,
              `---`,
              ``,
              `## Instagram з”Ёг‚­гѓӘгѓ—г‚·гѓ§гѓі (2200е­—д»Өе†…)`,
              ``,
              `<!-- INSTAGRAM_BODY_START -->`,
              draft.instagram_caption,
              `<!-- INSTAGRAM_BODY_END -->`,
              ``,
              `> дү®ж­ӘгЃ—гЃџгЃ„е өеђ€гЃҮгЂЃSTART/END гѓһгѓәг‚«гѓәгЃ® **й–“гЃ гЃ‘** г‚’з·Ёй›†гЃ—гЃ¦гЃЏгЃ гЃ•гЃ„гЂ‚`,
              ``,
              `---`,
              ``,
              `## ж“ҚдҢњж–№жі•`,
              ``,
              `- рџ“· **InstagramгЃ«жЉ•зЁү** в†’ гѓ©гѓ™гѓ« \`approved-instagram\``,
              `- вқЊ **еҚөдё‹** в†’ гѓ©гѓ™гѓ« \`rejected\``,
              ``,
              `---`,
              ``,
              `<details><summary>гѓҰг‚үжѓ…е ±</summary>`,
              ``,
              `- source_id: ${draft.source_id}`,
              `- topic: ${draft.topic}`,
              `- image_url: \`${draft.image_url}\``,
              carouselUrlsLine,
              `- generated_at: ${draft.generated_at}`,
              ``,
              `</details>`,
            ].join("\n");
            const wanted = [
              { name: 'draft', color: 'fbca04', description: 'ж‰үиҒҚең…гЃҰ' },
              { name: 'approved-instagram', color: 'e94560', description: 'InstagramгЃ«жЉ•зЁү' },
              { name: 'rejected', color: 'b60205', description: 'еҚөдё‹' },
              { name: 'posted-instagram', color: 'fad8c7', description: 'InstagramжЉ•зЁүжё€гЃү' },
            ];
            const existing = (await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, per_page: 100,
            })).map(l => l.name);
            for (const l of wanted) {
              if (!existing.includes(l.name)) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  name: l.name, color: l.color, description: l.description,
                });
              }
            }
            const issue = await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body, labels: ['draft'],
            });
            core.notice(`Draft issue created: #${issue.data.number}`);
            core.setOutput('issue_number', issue.data.number);
            core.setOutput('issue_url', issue.data.html_url);
            core.setOutput('issue_title', title);
            core.setOutput('caption_preview', (draft.instagram_caption || '').slice(0, 100));
            core.setOutput('image_url', draft.image_url);
            core.setOutput('carousel_count', carouselUrls.length);

      - name: Notify LINE
        if: success() && env.LINE_ACCESS_TOKEN != ''
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          ISSUE_URL: ${{ steps.create_issue.outputs.issue_url }}
          ISSUE_TITLE: ${{ steps.create_issue.outputs.issue_title }}
          CAPTION_PREVIEW: ${{ steps.create_issue.outputs.caption_preview }}
          IMAGE_URL: ${{ steps.create_issue.outputs.image_url }}
          CAROUSEL_COUNT: ${{ steps.create_issue.outputs.carousel_count }}
        run: |
          node -e '
            const text = `рџ“· InstagramжЉ•зЁүгЃ®дё‹ж›ёгЃҚгЃЊе±ЉгЃҚгЃңгЃ—гЃџ\n\n${process.env.ISSUE_TITLE}\n\nг‚­гѓӘгѓ—г‚·гѓ§гѓі(е†’й ­):\n${process.env.CAPTION_PREVIEW}...\n\nз”»еѓЏ: ${process.env.CAROUSEL_COUNT >= 2 ? `${process.env.CAROUSEL_COUNT}жһљг‚«гѓ«гѓәг‚»гѓ«` : "1жһљ"}\n\nрџ‘‰ е†…е®№зұғиҒҚ / ж‰үиҒҚ:\n${process.env.ISSUE_URL}\n\nж‰үиҒҚ: гѓ©гѓ™гѓ« approved-instagram\nеҚөдё‹: гѓ©гѓ™гѓ« rejected`;
            const messages = [];
            if (process.env.IMAGE_URL && process.env.IMAGE_URL.startsWith("https://")) {
              messages.push({
                type: "image",
                originalContentUrl: process.env.IMAGE_URL,
                previewImageUrl: process.env.IMAGE_URL,
              });
            }
            messages.push({ type: "text", text });
            const body = JSON.stringify({
              to: process.env.LINE_USER_ID,
              messages,
            });
            fetch("https://api.line.me/v2/bot/message/push", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${process.env.LINE_ACCESS_TOKEN}`,
              },
              body,
            }).then(async (r) => {
              const t = await r.text();
              if (!r.ok) { console.error("LINE notify failed:", r.status, t); process.exit(1); }
              console.log("LINE notify sent");
            }).catch((e) => { console.error("LINE notify error:", e); process.exit(1); });
          '
