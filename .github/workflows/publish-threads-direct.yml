name: Publish Threads Direct (X bot連携 — repository_dispatch起動)

# 𝕏投稿GAS から GitHub API repository_dispatch を叩いて起動する専用ワークフロー。
# 既存の draft.yml / publish.yml(Instagram用)には一切干渉しない。
on:
  repository_dispatch:
    types: [threads-post]
  workflow_dispatch:
    inputs:
      text:
        description: 'Threads投稿本文(500字以内)'
        required: true
      image_url:
        description: '画像URL(単一画像時)'
        required: false
        default: ''
      carousel_urls:
        description: '複数画像URL(カンマ区切り・最大4枚 / 単一画像時は image_url を使用)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci || npm install

      - name: Diagnose secrets and inputs
        env:
          REQ_TEXT: ${{ github.event.client_payload.text || github.event.inputs.text }}
          REQ_IMAGE_URL: ${{ github.event.client_payload.image_url || github.event.inputs.image_url }}
          HAS_USER_ID: ${{ secrets.THREADS_USER_ID != '' }}
          HAS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN != '' }}
        run: |
          echo "event_name: ${{ github.event_name }}"
          echo "text length: ${#REQ_TEXT}"
          echo "text head 60: ${REQ_TEXT:0:60}"
          echo "image_url: ${REQ_IMAGE_URL:-(none)}"
          echo "secret THREADS_USER_ID present: $HAS_USER_ID"
          echo "secret THREADS_ACCESS_TOKEN present: $HAS_TOKEN"

      - name: Post to Threads
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          DRAFT_IN_THREADS_TEXT: ${{ github.event.client_payload.text || github.event.inputs.text }}
          DRAFT_IN_IMAGE_URL: ${{ github.event.client_payload.image_url || github.event.inputs.image_url }}
          DRAFT_IN_CAROUSEL_URLS: ${{ github.event.client_payload.carousel_urls || github.event.inputs.carousel_urls }}
          TARGET: threads
        run: node post.js publish
