name: Sync sources from microCMS

on:
  schedule:
    # 毎日朝6時(UTC 21:00 = JST 6:00)に同期
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync sources from microCMS
        env:
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          MICROCMS_SERVICE_ID: ${{ secrets.MICROCMS_SERVICE_ID || 'a5xuqpwtq5' }}
          MICROCMS_ENDPOINT: project
          # 除外したい作品ID(カンマ区切り、必要なら追加)
          EXCLUDE_IDS: "awa-cr9_lb,c9kywngb1-s,6yo3lkr_57,mjd6f97re"
        run: node sync-sources.js

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain sources.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sources.json
            git commit -m "auto: sync sources from microCMS ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
            echo "✅ sources.json updated"
          else
            echo "ℹ️ No changes"
          fi
