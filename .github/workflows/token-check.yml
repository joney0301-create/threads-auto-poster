name: Token Check
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Threads token validity
        env:
          T: ${{ secrets.THREADS_ACCESS_TOKEN }}
          U: ${{ secrets.THREADS_USER_ID }}
        run: |
          echo "=== GET /me ==="
          curl -sS "https://graph.threads.net/v1.0/me?fields=id,username&access_token=$T"; echo
          echo "=== GET /{user_id} ==="
          curl -sS "https://graph.threads.net/v1.0/$U?fields=id,username&access_token=$T"; echo